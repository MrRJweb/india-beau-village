# ============================================================
# India Beau Village — règles 301 (nginx)
# Canonique : https://indiabeauvillage.com
# À inclure dans la configuration du serveur (certificats requis
# pour chaque nom de domaine si HTTPS est servi avant redirection).
# ============================================================

# ---- indiabeauvillagemontreal.com (ancien système DI Develop) ----
server {
    listen 80; listen 443 ssl;
    server_name indiabeauvillagemontreal.com www.indiabeauvillagemontreal.com;

    location = /                        { return 301 https://indiabeauvillage.com/; }
    location ~ ^/(cart|login|registration|terms_and_conditions|privacy_policy)(/|$)
                                        { return 301 https://indiabeauvillage.com/; }
    location ~ ^/menu(/|$)              { return 301 https://indiabeauvillage.com/menu.html; }
    location ~ ^/c(/|$)                 { return 301 https://indiabeauvillage.com/menu.html; }
    location ~ ^/location(/|$)          { return 301 https://indiabeauvillage.com/contact.html; }
    location ~ ^/reviews(/|$)           { return 301 https://indiabeauvillage.com/a-propos.html; }
    # Fiches produits à la racine (longue traîne) → le tableau
    location /                          { return 301 https://indiabeauvillage.com/menu.html; }
}

# ---- restoindiabeauvillage.ca (vitrine RestoMontreal, une page) ----
server {
    listen 80; listen 443 ssl;
    server_name restoindiabeauvillage.ca www.restoindiabeauvillage.ca;
    return 301 https://indiabeauvillage.com/;
}

# ---- Canonique : www→apex, http→https, chemins hérités ----
server {
    listen 80;
    server_name indiabeauvillage.com www.indiabeauvillage.com;
    return 301 https://indiabeauvillage.com$request_uri;
}
server {
    listen 443 ssl;
    server_name www.indiabeauvillage.com;
    return 301 https://indiabeauvillage.com$request_uri;
}
server {
    listen 443 ssl;
    server_name indiabeauvillage.com;
    root /var/www/indiabeauvillage;
    index index.html;

    location ~* ^/menue/?$      { return 301 /menu.html; }
    location ^~ /franquias/     { return 301 /; }
}
